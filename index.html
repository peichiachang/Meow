<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/alan-sans@latest/latin-700-normal.css" />
    <title>Meow - 了解喵喵的內心話</title>
  </head>
  <body>
    <div id="root">
      <div id="welcome-screen" style="position:fixed;inset:0;z-index:99999;background:#fff7ed;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;font-family:system-ui;-webkit-font-smoothing:antialiased;">
        <div style="font-size:2rem;font-weight:700;color:#1c1917;margin-bottom:0.25rem;">Meow</div>
        <div style="font-size:0.9rem;color:#78716c;margin-bottom:1.5rem;">了解喵喵的內心話</div>
        <div style="font-size:0.85rem;color:#a8a29e;" id="welcome-msg">正在取得最新版本…</div>
      </div>
    </div>
    <script id="version-check" data-version="__BUILD_VERSION__">(function(){
      var welcomeMsg=document.getElementById('welcome-msg');
      var setMsg=function(t){if(welcomeMsg)welcomeMsg.textContent=t;};
      var el=document.getElementById('version-check');
      var buildVer=(el&&el.getAttribute('data-version'))||'';
      var done=false;
      function finish(){if(done)return;done=true;setMsg('載入中…');}
      if(typeof caches!=='undefined'&&caches.keys){try{caches.keys().then(function(keys){keys.forEach(function(k){caches.delete(k);});});}catch(e){}}
      setTimeout(function(){finish();},4000);
      fetch('/version.json?t='+Date.now(),{cache:'no-store'}).then(function(r){return r.ok&&(r.headers.get('content-type')||'').includes('json')?r.json():null;}).then(function(d){
        if(done)return;
        if(!d||!d.version){finish();return;}
        var serverVer=d.version;
        if(buildVer&&buildVer.indexOf('__')!==0&&serverVer!==buildVer){
          done=true;
          setMsg('正在更新至最新版本…');
          location.replace('/?v='+encodeURIComponent(serverVer));
          return;
        }
        finish();
      }).catch(function(){finish();});
    })();</script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
