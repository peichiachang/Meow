<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
    <title>Meow - 了解喵喵的內心話</title>
  </head>
  <body>
    <div id="root"></div>
    <script id="version-check" data-version="__BUILD_VERSION__">(function(){var el=document.getElementById('version-check');var buildVer=(el&&el.getAttribute('data-version'))||'';if(!buildVer||buildVer.indexOf('__')===0)return;fetch('/version.json?t='+Date.now(),{cache:'no-store'}).then(function(r){return r.ok&&(r.headers.get('content-type')||'').includes('json')?r.json():null;}).then(function(d){if(d&&d.version&&d.version!==buildVer){document.body.innerHTML='<div style="position:fixed;inset:0;z-index:99999;background:#1c1917;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;text-align:center;font-size:1rem;"><p style="margin-bottom:1rem;">發現新版本，請重新整理以取得最新功能</p><button onclick="location.reload()" style="padding:0.6rem 1.2rem;background:#f59e0b;color:#1c1917;border:none;border-radius:8px;font-weight:600;cursor:pointer;">重新整理</button></div>';}});})();</script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
