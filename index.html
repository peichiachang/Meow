<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Alan+Sans:wght@700&display=swap" rel="stylesheet" />
    <title>Meow - 了解喵喵的內心話</title>
  </head>
  <body>
    <div id="root">
      <div id="welcome-screen" style="position:fixed;inset:0;z-index:99999;background:#fff7ed;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;font-family:system-ui;-webkit-font-smoothing:antialiased;">
        <div style="font-size:2rem;font-weight:700;color:#1c1917;margin-bottom:0.25rem;">Meow</div>
        <div style="font-size:0.9rem;color:#78716c;margin-bottom:1.5rem;">了解喵喵的內心話</div>
        <div style="font-size:0.85rem;color:#a8a29e;" id="welcome-msg">正在取得最新版本…</div>
      </div>
    </div>
    <script id="version-check" data-version="__BUILD_VERSION__">(function(){
      var welcomeMsg=document.getElementById('welcome-msg');
      var setMsg=function(t){if(welcomeMsg)welcomeMsg.textContent=t;};
      var el=document.getElementById('version-check');
      var buildVer=(el&&el.getAttribute('data-version'))||'';
      var done=false;
      var bundleLoaded=false;
      var versionCheckTimeout;
      
      function finish(){if(done)return;done=true;setMsg('載入中…');}
      
      function forceReload(reason){
        if(done)return;
        done=true;
        setMsg('正在重新載入最新版本…');
        // 清除所有快取後重新載入
        if(typeof caches!=='undefined'&&caches.keys){
          caches.keys().then(function(keys){
            keys.forEach(function(k){caches.delete(k);});
            setTimeout(function(){location.replace('/?v='+Date.now()+'&reason='+encodeURIComponent(reason));},500);
          }).catch(function(){
            setTimeout(function(){location.replace('/?v='+Date.now()+'&reason='+encodeURIComponent(reason));},500);
          });
        }else{
          setTimeout(function(){location.replace('/?v='+Date.now()+'&reason='+encodeURIComponent(reason));},500);
        }
      }
      
      // 清除所有 Service Worker 和快取
      if(typeof caches!=='undefined'&&caches.keys){
        try{
          caches.keys().then(function(keys){keys.forEach(function(k){caches.delete(k);});}).catch(function(){});
        }catch(e){}
      }
      if('serviceWorker' in navigator){
        navigator.serviceWorker.getRegistrations().then(function(registrations){
          registrations.forEach(function(reg){reg.unregister();});
        }).catch(function(){});
      }
      
      // 縮短超時時間：從 4 秒改為 2 秒
      versionCheckTimeout=setTimeout(function(){
        if(!done&&!bundleLoaded){
          finish();
        }
      },2000);
      
      // 版本檢查
      fetch('/version.json?t='+Date.now(),{cache:'no-store'}).then(function(r){
        if(versionCheckTimeout)clearTimeout(versionCheckTimeout);
        return r.ok&&(r.headers.get('content-type')||'').includes('json')?r.json():null;
      }).then(function(d){
        if(done)return;
        if(!d||!d.version){finish();return;}
        var serverVer=d.version;
        if(buildVer&&buildVer.indexOf('__')!==0&&serverVer!==buildVer){
          forceReload('version-mismatch');
          return;
        }
        finish();
      }).catch(function(){
        if(versionCheckTimeout)clearTimeout(versionCheckTimeout);
        finish();
      });
      
      // 監控 bundle 載入失敗
      window.addEventListener('error',function(e){
        if(e.target&&e.target.tagName==='SCRIPT'&&e.target.src&&e.target.src.includes('/assets/')){
          if(!bundleLoaded){
            bundleLoaded=true;
            console.error('[VersionCheck] Bundle load failed:',e.target.src);
            forceReload('bundle-load-failed');
          }
        }
      },true);
      
      // 監控 bundle 載入成功
      var scripts=document.querySelectorAll('script[type="module"]');
      scripts.forEach(function(script){
        script.addEventListener('load',function(){
          bundleLoaded=true;
          if(versionCheckTimeout)clearTimeout(versionCheckTimeout);
        });
        script.addEventListener('error',function(){
          if(!bundleLoaded){
            bundleLoaded=true;
            console.error('[VersionCheck] Module script load failed:',script.src);
            forceReload('module-load-failed');
          }
        });
      });
    })();</script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
